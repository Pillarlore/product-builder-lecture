<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>제휴 문의</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <main class="page">
    <section class="hero">
      <p class="eyebrow">Partnership</p>
      <h1>제휴 문의를 빠르게 받아보세요.</h1>
      <p class="intro">
        브랜드 협업, 공동 마케팅, 입점, B2B 제안 등 간단한 내용을 남겨주시면 확인 후 회신드립니다.
      </p>
    </section>

    <section class="form-card">
      <form
        id="partnership-form"
        class="contact-form"
        action="https://formspree.io/f/xqeylger"
        method="POST"
      >
        <label>
          회사명
          <input type="text" name="company" placeholder="예: Pillarlore" required />
        </label>

        <label>
          담당자명
          <input type="text" name="name" placeholder="이름을 입력해주세요" required />
        </label>

        <label>
          이메일
          <input type="email" name="email" placeholder="name@company.com" required />
        </label>

        <label>
          문의 유형
          <select name="partnership_type" required>
            <option value="">선택해주세요</option>
            <option value="brand-collaboration">브랜드 협업</option>
            <option value="distribution">입점/유통</option>
            <option value="marketing">공동 마케팅</option>
            <option value="other">기타 제안</option>
          </select>
        </label>

        <label>
          문의 내용
          <textarea
            name="message"
            rows="6"
            placeholder="제휴 목적, 기대 효과, 일정 등을 간단히 적어주세요."
            required
          ></textarea>
        </label>

        <input type="hidden" name="_subject" value="새 제휴 문의가 도착했습니다" />
        <button type="submit">문의 보내기</button>
        <p id="form-status" class="form-status" aria-live="polite"></p>
      </form>
    </section>
  </main>
  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
